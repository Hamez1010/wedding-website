<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome | Carina & James</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/auth.js"></script>
    <style>
        body {
            background: var(--background);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .login-card {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 450px;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: var(--primary);
            font-family: 'Playfair Display', serif;
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
        }

        p {
            color: var(--text);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--highlight);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            background-color: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .error {
            color: #d9534f;
            margin-top: 1rem;
            font-size: 0.9rem;
            min-height: 1.2rem;
        }

        .lock-icon {
            font-size: 3rem;
            color: var(--highlight);
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="lock-icon">💍</div>
        <h1>Our Wedding</h1>
        <p>Please enter the password from your invitation to view our wedding details.</p>
        
        <form id="login-form">
            <div class="input-group">
                <input type="password" id="password" placeholder="Enter Password" required autofocus>
            </div>
            <button type="submit">Enter Site</button>
            <p class="error" id="error-message"></p>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-message');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;

            if (password === 'JCWedding2027') {
                localStorage.setItem('guest_auth', 'true');
                window.location.href = 'index.html';
            } else {
                errorMsg.textContent = "Incorrect password. Please try again.";
                document.getElementById('password').value = '';
            }
        });
    </script>
</body>

</html>
